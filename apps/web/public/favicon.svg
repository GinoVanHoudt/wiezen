<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="felt" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#3a6243"/>
      <stop offset="100%" stop-color="#1d2b1f"/>
    </radialGradient>
  </defs>

  <!-- felt background -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#felt)"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#d4a017" stroke-width="2.5"/>

  <!-- cards, enlarged and optically centred -->
  <g transform="translate(32 31) scale(1.13) translate(-32 -32)">
  <!-- back card (spade), fanned left -->
  <g transform="rotate(-14 26 32)">
    <rect x="13" y="14" width="26" height="36" rx="4" fill="#e9e4d2" stroke="#9a9482" stroke-width="1"/>
    <path d="M26 21.5c-3.4 4.1-6.5 6.5-6.5 9.6 0 2.1 1.7 3.6 3.7 3.6 1 0 1.9-.4 2.8-1.2-.4 1.9-1.2 3.3-2.4 4.5h4.8c-1.2-1.2-2-2.6-2.4-4.5.9.8 1.8 1.2 2.8 1.2 2 0 3.7-1.5 3.7-3.6 0-3.1-3.1-5.5-6.5-9.6z" fill="#1c1c20"/>
  </g>

  <!-- front card (heart), fanned right -->
  <g transform="rotate(11 38 34)">
    <rect x="25" y="16" width="26" height="36" rx="4" fill="#fdfdf8" stroke="#9a9482" stroke-width="1"/>
    <path d="M38 41.5c-4.9-4.6-8.2-7.5-8.2-11.1 0-2.9 2.3-5 5-5 1.3 0 2.5.5 3.2 1.4.7-.9 1.9-1.4 3.2-1.4 2.7 0 5 2.1 5 5 0 3.6-3.3 6.5-8.2 11.1z" fill="#b3262e"/>
  </g>
  </g>
</svg>
